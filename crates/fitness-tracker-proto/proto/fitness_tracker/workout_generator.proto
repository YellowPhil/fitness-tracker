syntax = "proto3";

package fitness_tracker.workout_generator;

import "fitness_tracker/common.proto";

service WorkoutGeneratorService {
  rpc GenerateWorkout(GenerateWorkoutRequest) returns (GenerateWorkoutResponse);
}

message GenerateWorkoutRequest {
  int64 user_id = 1;
  string date = 2;
  repeated fitness_tracker.common.MuscleGroup muscle_groups = 3;
  int32 max_exercise_count = 4;
}

message GeneratedSet {
  int32 reps = 1;
  optional double weight_kg = 2;
}

message GeneratedExercise {
  string exercise_id = 1;
  string exercise_name = 2;
  optional string notes = 3;
  repeated GeneratedSet sets = 4;
}

message GenerateWorkoutResponse {
  optional string workout_name = 1;
  repeated GeneratedExercise exercises = 2;
}
