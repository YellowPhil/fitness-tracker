services:
  app:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      target: app
    environment:
      - BIND_ADDR=${BIND_ADDR:?Set BIND_ADDR in Coolify}
      - FITNESS_EXERCISE_DB=/data/exercises.db
      - FITNESS_WORKOUT_DB=/data/workouts.db
      - RUST_LOG=${RUST_LOG:-info}
    volumes:
      - fitness-data:/data
    restart: unless-stopped

volumes:
  fitness-data: