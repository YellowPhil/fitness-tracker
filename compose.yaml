# Production stack (main branch
# Frontend is deployed separately to Cloudflare Pages.
#
# Required env vars:
#   BIND_ADDR, FRONTEND_URL, BACKEND_URL, TELOXIDE_TOKEN
# Optional:
#   RUST_LOG (default: info)

services:
  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      target: api
    environment:
      - BIND_ADDR=${BIND_ADDR:?Set BIND_ADDR}
      - FRONTEND_URL=${FRONTEND_URL:?Set FRONTEND_URL}
      - FITNESS_EXERCISE_DB=/data/exercises.db
      - FITNESS_WORKOUT_DB=/data/workouts.db
      - FITNESS_HEALTH_DB=/data/health.db
      - RUST_LOG=${RUST_LOG:-info}
    volumes:
      - fitness-data:/data
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      target: bot
    environment:
      - TELOXIDE_TOKEN=${TELOXIDE_TOKEN:?Set TELOXIDE_TOKEN}
      - FRONTEND_URL=${FRONTEND_URL:?Set FRONTEND_URL}
      - RUST_LOG=${RUST_LOG:-info}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

volumes:
  fitness-data:
