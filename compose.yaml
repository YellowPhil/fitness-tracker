# Production stack (main branch
# Frontend is deployed separately to Cloudflare Pages.
#
# Required env vars:
#   BIND_ADDR, FRONTEND_URL, BACKEND_URL, TELOXIDE_TOKEN, POSTGRES_URL, WG_OPENAI_API_KEY
# Optional:
#   RUST_LOG (default: info), ALLOWED_USER_IDS (whitelist of Telegram user IDs separated by commas)

services:
  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      target: api
    environment:
      - BIND_ADDR=${BIND_ADDR:?Set BIND_ADDR}
      - GRPC_BIND_ADDR=${GRPC_BIND_ADDR:-0.0.0.0:50051}
      - FRONTEND_URL=${FRONTEND_URL:?Set FRONTEND_URL}
      - TELOXIDE_TOKEN=${TELOXIDE_TOKEN:?Set TELOXIDE_TOKEN}
      - POSTGRES_URL=${POSTGRES_URL:?Set POSTGRES_URL}
      - RUST_LOG=${RUST_LOG:-info}
      - ALLOWED_USER_IDS=${ALLOWED_USER_IDS}
      - WORKOUT_GENERATOR_GRPC_URL=${WORKOUT_GENERATOR_GRPC_URL:-http://workout-generator:50052}
      - GRPC_TIMEOUT_SECONDS=${GRPC_TIMEOUT_SECONDS:-60}
    restart: unless-stopped

  workout-generator:
    build:
      context: ./services/workout-generator-py
      dockerfile: Dockerfile
    environment:
      - WG_APP_ENV=${WG_APP_ENV:-prod}
      - WG_GRPC_BIND_ADDR=${WG_GRPC_BIND_ADDR:-0.0.0.0:50052}
      - WG_OPENAI_API_KEY=${WG_OPENAI_API_KEY:?Set WG_OPENAI_API_KEY}
      - WG_OPENAI_MODEL=${WG_OPENAI_MODEL:-gpt-5-mini}
      - WG_OPENAI_MAX_COMPLETION_TOKENS=${WG_OPENAI_MAX_COMPLETION_TOKENS:-8192}
      - WG_OPENAI_TIMEOUT_SECONDS=${WG_OPENAI_TIMEOUT_SECONDS:-60}
      - WG_GRPC_RUST_ADDR=${WG_GRPC_RUST_ADDR:-backend:50051}
      - WG_GRPC_TIMEOUT_SECONDS=${WG_GRPC_TIMEOUT_SECONDS:-10}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      target: bot
    environment:
      - TELOXIDE_TOKEN=${TELOXIDE_TOKEN:?Set TELOXIDE_TOKEN}
      - FRONTEND_URL=${FRONTEND_URL:?Set FRONTEND_URL}
      - RUST_LOG=${RUST_LOG:-info}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
